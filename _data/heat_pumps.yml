# =============================================================================
# Heat pump SCOP dataset for crog.uk
# -----------------------------------------------------------------------------
# Single source of truth for the SCOP comparison table(s). Rendered to HTML by
# Liquid in the SCOP posts (see _posts/*Heat Pump SCOP*.md). Kept as data so we
# can dedupe, filter (by kW output), re-rank, and drive tooling
# (tools/fetch_mcs.py, tools/check_links.py).
#
# Standards / methodology (see 2024 SCOP post for full notes):
#   - EN 14511/14825 Average Climate. Low temp = 35C, Medium = 45C, High = 55C.
#   - Ordered by SCOP@35 desc; tie-break on 45C then 55C.
#   - MCS Product Database figures are the source of truth and OVERRIDE datasheet
#     figures where they differ: https://mcscertified.com/product-directory/
#   - scop.["45"] is estimated as mean(35,55) when a datasheet omits it; flag it
#     with scop_45_estimated: true (a conservative underestimate).
#
# Field reference:
#   manufacturer, model   Display name parts.
#   output_kw             Nominal rated output (kW) used for filtering. Some
#                         units cycle because they are oversized (8kW+).
#   refrigerant           e.g. R290, R32, R454C.
#   scop_35 / _45 / _55   Verified/best-known SCOP figures actually used to rank
#                         (null when unknown).
#   scop_45_estimated     true when the 45C value is mean(35,55), not measured.
#   datasheet_scop_35/_45/_55
#                         Manufacturer datasheet figures WHEN they differ from
#                         the MCS-verified scop_* above (kept for transparency).
#   validation            One of: gem | green_book | orange_book | broken_heart
#                           gem          datasheet matches MCS
#                           green_book   MCS-only or close match
#                           orange_book  MCS present but not close to datasheet
#                           broken_heart not validated / unknown
#   status                Confidence tier for filtering:
#                           mcs        has an MCS certificate (verified)
#                           datasheet  has SCOP figures but no MCS cert yet
#                           rumoured   announced / on market but no usable data
#   mcs_cert              MCS / KIWA certificate reference.
#   mcs_search            Token that finds this product/line via the MCS API
#                         `search` (tools/fetch_mcs.py). The API search matches a
#                         token in the product Name only, so this is a line-level
#                         key (e.g. "aroTHERM", "Therma V"); null means the model
#                         is not currently surfaced by the API (verify manually).
#   sound_power_dba       Sound power level (dBA), range allowed as string.
#   wall_mount            true | false | null(unknown). Only true when the
#                         datasheet explicitly states wall mounting.
#   date_valid            Date the figures were captured/valid (YYYY-MM[-DD]).
#   links:                site / datasheet / brochure / mcs (any may be null).
#   comment               Free text note.
# =============================================================================

